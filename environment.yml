name: tsunami-tumaco
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - xarray>=2023.1
  - netcdf4>=1.6
  - rasterio>=1.3
  - pyproj>=3.5
  - gdal>=3.6
  - scikit-image>=0.20
  - cartopy>=0.21
  - ipywidgets>=8.0
  - jupyter>=1.0
  - jupyterlab>=3.6
  - pip
  - pip:
    - tensorflow==1.15.5  # TPU-compatible version (Colab provides this)
    - google-cloud-storage>=2.10
    - mystmd>=1.1
